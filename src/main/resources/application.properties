spring.application.name=demo-for-llm

# Groq API Configuration
# Get free API key from https://console.groq.com/keys
# Set environment variable LLM_API_KEY or create application-local.properties
llm.api.key=${LLM_API_KEY:}

# Model options: llama-3.1-8b-instant, llama-3.3-70b-versatile, mixtral-8x7b-32768
llm.model=${LLM_MODEL:llama-3.1-8b-instant}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Web Scraper Configuration
web.scraper.timeout=10000
web.scraper.userAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36