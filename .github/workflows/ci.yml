name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean install -DskipTests
      
    - name: Run tests
      run: mvn test
      
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit
        
    - name: Build Docker image
      run: docker build -t llm-token-optimizer:${{ github.sha }} .
      
    - name: Run Docker container test
      run: |
        docker run -d -p 8080:8080 --name test-container \
          -e LLM_API_KEY=test-key \
          llm-token-optimizer:${{ github.sha }}
        sleep 10
        docker logs test-container
        docker stop test-container
        docker rm test-container

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Check code style
      run: mvn checkstyle:check || true
      
    - name: Dependency check
      run: mvn dependency:analyze || true
